config_version = "0"

exclude_patterns = [
    "*_min.*",
    "*-min.*",
    "*.min.*",
    "**/.yarn/**",
    "**/*.d.ts",
    "**/assets/**",
    "**/bower_components/**",
    "**/build/**",
    "**/cache/**",
    "**/db/**",
    "**/deps/**",
    "**/dist/**",
    "**/extern/**",
    "**/external/**",
    "**/generated/**",
    "**/Godeps/**",
    "**/gradlew/**",
    "**/mvnw/**",
    "**/node_modules/**",
    "**/protos/**",
    "**/seed/**",
    "**/target/**",
    "**/templates/**",
    "**/testdata/**",
    "**/vendor/**",
    ".qlty/configs/**",
    ".sinemacula/**"
]

test_patterns = [
    "**/test/**",
    "**/tests/**",
    "**/spec/**",
    "**/*.test.*",
    "**/*.spec.*",
    "**/*_test.*",
    "**/*_spec.*",
    "**/test_*.*",
    "**/spec_*.*"
]

[runtimes.enabled]
php = "8.3"

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[source]]
name = "sinemacula"
repository = "https://github.com/sinemacula/coding-standards"
tag = "v1.8.4"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "php-codesniffer"
version = "4.0.1"
mode = "comment"
package_file = "composer.json"
package_filters = ["slevomat", "dealerdirect", "sinemacula"]

# phpcs 4.x returns exit code 3 when it finds issues; qlty's default
# success_codes ([0, 1]) would treat that as a plugin failure and discard the
# findings. This override accepts the 4.x codes. It lives here, not in the
# shared source.toml, because a drivers table there breaks the source's
# exported_config_paths. Only required while on phpcs 4.x.
[plugins.definitions.php-codesniffer.drivers.lint]
success_codes = [0, 1, 2, 3]

# Pinned to the last php-cs-fixer release whose symfony/console stays on the 7.x
# line. 3.90+ pulls symfony/console 8 (requires PHP 8.4.1 and uses 8.4-only
# syntax), which qlty's PHP 8.3 runner cannot parse. Bump once the runner ships
# PHP 8.4.
[[plugin]]
name = "php-cs-fixer"
package_file = "composer.json"
package_filters = ["sinemacula"]
version = "3.89.0"

[[plugin]]
name = "radarlint-php"
mode = "comment"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trivy"
drivers = [
    "config",
    "fs-vuln",
]

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

[[plugin]]
name = "phpstan"
version = "2.2.2"
package_file = "composer.json"
